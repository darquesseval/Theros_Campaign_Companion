function rnd(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function choose(arr){ return arr[rnd(0,arr.length-1)]; }

  {keys:["swarm","stirge","wasp","beetle","wolf spiders","stirges"], tag:"swarm_skirmish"},
  {keys:["mimic","trap","quicksand","quickmud","earthquake","wildfire","flood","storm","dust storm"], tag:"hazard"},
  {keys:["oracle","priest","unicorn","centaur","satyr","bard","merchant","druid"], tag:"social"}
];

function classify(text){
  const t = text.toLowerCase();
  const out = new Set();
  for(const m of threatMap){
    for(const k of m.keys){
      if(t.includes(k)) { out.add(m.tag); break; }
    }
  }
  return Array.from(out);
}

function adviceFor(tags, level){
  const lvl = Math.max(1, Math.min(20, parseInt(level)||3));
  const low = lvl <= 4;
  const mid = lvl <= 10 && lvl >=5;
  const adv = [];
  if(tags.includes("boss")){
    if(low) adv.push("Boss: convert to smaller/juvenile variant or make noncombat.");
    else if(mid) adv.push("Boss: use weaker stat block, reduce legendary actions/heads.");
    else adv.push("Boss: full stat block; consider lair/minions for drama.");
  }
  if(tags.includes("bandits")){
    if(low) adv.push("Bandits: halve number or use weaker bandits (CR ~1/4–1).");
    else adv.push("Bandits: use numbers as written or add a captain for difficulty.");
  }
  if(tags.includes("undead_group")){
    if(low) adv.push("Undead: reduce numbers or swap weaker undead; avoid many multiattacks.");
    else adv.push("Undead: numbers as written are fine for a group fight.");
  }
  if(tags.includes("tough_combat")){
    if(low) adv.push("Tough creatures: reduce count or swap to weaker variant (CR 1–3).");
    else adv.push("Tough creatures: keep or slightly increase HP/damage for challenge.");
  }
  if(tags.includes("swarm_skirmish")){
    adv.push("Swarm: good short fights; increase counts for higher levels or reduce for low levels.");
  }
  if(tags.includes("hazard")){
    adv.push("Hazard: lower DCs/duration/damage for low-level parties.");
  }
  if(tags.includes("social")){
    adv.push("Social: no combat scaling needed; scale rewards/boons to level.");
  }
  if(adv.length===0) adv.push("No specific threat tags found — use encounter as written and adjust if it feels too hard.");
  return adv;
}

const outEl = document.getElementById('out');
const tableSelect = document.getElementById('tableSelect');
const levelInput = document.getElementById('level');
const rollBtn = document.getElementById('rollBtn');
const copyBtn = document.getElementById('copyBtn');function formatOutput(title, encounterText, advices) {
  const lines = [];
  lines.push(title);
  lines.push('');
  lines.push(encounterText);
  lines.push('');
  lines.push('Scaling & GM notes:');
  advices.forEach((a, i) => lines.push(`${i + 1}. ${a}`));
  return lines.join('\n');
}
rollBtn.addEventListener('click', () => {
  const tableName = tableSelect.value;
  const lvl = parseInt(levelInput.value) || 3;
  const table = tableName === 'forest' ? forest : roads;
  const entry = choose(table);
  const tags = classify(entry);
  const adv = adviceFor(tags, lvl);
  const title = `${tableName === 'forest' ? 'Forest' : 'Roads'} encounter — roll result`;
  outEl.textContent = formatOutput(title, entry, adv);
});copyBtn.addEventListener('click', async () => {
  try {
    await navigator.clipboard.writeText(outEl.textContent);
    copyBtn.textContent = 'Copied';
    setTimeout(()=> copyBtn.textContent = 'Copy', 1200);
  } catch (e) {
    // fallback: select & prompt
    const range = document.createRange();
    range.selectNodeContents(outEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    try { document.execCommand('copy'); 
copyBtn.textContent = 'Copied'; setTimeout(()=> copyBtn.textContent = 'Copy',1200); }
    catch(_) { alert('Copy failed — select the text and press Ctrl/Cmd+C'); }
    sel.removeAllRanges();
  }
});/* small helper functions (if not already defined earlier in your file) /
function rnd(min,max){ return Math.floor(Math.random()(max-min+1))+min; }
function choose(arr){ return arr[Math.floor(Math.random()*arr.length)]; }/* Initialize with one roll so the page isn't blank */
